<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AgendeAgora - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container container-dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="boas-vindas" style="margin: 0;">Olá!</h2>
            <a href="/logout" class="btn btn-danger" style="width: auto; padding: 8px 15px;">Sair</a>
        </div>

        <div class="dashboard-grid">
            <div class="container" style="padding: 20px; max-width: 100%;">
                <h3 style="color: #f3b51a; margin-bottom: 15px; font-size: 18px;">Novo Agendamento</h3>
                <form action="/dashboard/novo" method="POST">
                    <div class="form-group">
                        <label>Serviço</label>
                        <select name="servico" required>
                            <option value="Corte Masculino - R$ 30,00">Corte Masculino - R$ 30,00</option>
                            <option value="Barba Completa - R$ 20,00">Barba Completa - R$ 20,00</option>
                            <option value="Corte + Barba - R$ 45,00">Corte + Barba - R$ 45,00</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" name="data" required>
                    </div>
                    <div class="form-group">
                        <label>Horário</label>
                        <input type="time" name="hora" required>
                    </div>
                    <button type="submit">Confirmar Agendamento</button>
                </form>
            </div>

            <div>
                <h3 style="margin-bottom: 15px; font-size: 18px; color: #b3b3b3;">Meus Agendamentos / Agenda Geral</h3>
                <div id="lista-agendamentos">
                    </div>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
